<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="400" rx="24" fill="url(#bg)"/>

  <text x="48" y="58" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Semantic Routing Module
  </text>
  <text x="48" y="88" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Paper-aligned semantic stage: signals, decision blocks, and logical-model selection.
  </text>

  <rect x="40" y="150" width="170" height="154" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="60" y="190" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Request
  </text>
  <text x="60" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    content
  </text>
  <text x="60" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    control metadata
  </text>
  <text x="60" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    session context
  </text>

  <rect x="230" y="150" width="230" height="154" rx="18" fill="#FFFFFF" stroke="#93C5FD" filter="url(#shadow)"/>
  <text x="250" y="190" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Signal Extraction
  </text>
  <text x="250" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    intent and domain
  </text>
  <text x="250" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    complexity and modality
  </text>
  <text x="250" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    PII and jailbreak signals
  </text>

  <rect x="480" y="150" width="220" height="154" rx="18" fill="#FFFFFF" stroke="#60A5FA" filter="url(#shadow)"/>
  <text x="500" y="190" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Decision Blocks
  </text>
  <text x="500" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    hard constraints
  </text>
  <text x="500" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    policy thresholds
  </text>
  <text x="500" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    quality-cost decision
  </text>

  <rect x="720" y="150" width="180" height="154" rx="18" fill="#FFFFFF" stroke="#38BDF8" filter="url(#shadow)"/>
  <text x="740" y="190" fill="#0C4A6E" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Selection Layer
  </text>
  <text x="740" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    policy plugins
  </text>
  <text x="740" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    choose model m*
  </text>
  <text x="740" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    preserve continuity
  </text>

  <rect x="920" y="150" width="240" height="154" rx="18" fill="#FFFFFF" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="940" y="190" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Logical Model Output
  </text>
  <text x="940" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    normalized model field
  </text>
  <text x="940" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    handoff metadata
  </text>
  <text x="940" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    no endpoint chosen here
  </text>

  <line x1="210" y1="231" x2="230" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="460" y1="231" x2="480" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="700" y1="231" x2="720" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="900" y1="231" x2="920" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="40" y="336" width="1120" height="44" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="68" y="363" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    This module corresponds to the paper's select stage. It stops at logical-model choice and hands off to endpoint routing downstream.
  </text>
</svg>
