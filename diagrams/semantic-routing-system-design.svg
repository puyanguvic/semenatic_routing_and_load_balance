<svg width="1440" height="960" viewBox="0 0 1440 960" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#D97706"/>
    </marker>
  </defs>

  <rect width="1440" height="960" rx="28" fill="url(#bg)"/>

  <text x="48" y="62" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Semantic Routing Module System Design
  </text>
  <text x="48" y="94" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Aligned to semantic-router's signal-driven core: requests flow through signals, decisions, model selection, plugins, and a stable handoff contract.
  </text>

  <rect x="48" y="120" width="198" height="28" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="147" y="139" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    ROUTING INPUTS
  </text>

  <rect x="340" y="120" width="258" height="28" rx="14" fill="#E0E7FF" stroke="#C7D2FE"/>
  <text x="469" y="139" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    CONFIGURED ROUTING SURFACES
  </text>

  <rect x="340" y="320" width="242" height="28" rx="14" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="461" y="339" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    SEMANTIC ROUTING CORE
  </text>

  <rect x="1136" y="320" width="248" height="28" rx="14" fill="#ECFCCB" stroke="#BEF264"/>
  <text x="1260" y="339" fill="#3F6212" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    OUTPUTS AND OUTCOMES
  </text>

  <rect x="340" y="808" width="250" height="28" rx="14" fill="#F1F5F9" stroke="#CBD5E1"/>
  <text x="465" y="827" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    EXPLAINABILITY AND AUDIT
  </text>

  <rect x="40" y="164" width="260" height="560" rx="24" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <text x="64" y="206" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Routing Inputs
  </text>
  <text x="64" y="234" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Inputs that are normalized into the
  </text>
  <text x="64" y="254" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    canonical routing context.
  </text>

  <rect x="60" y="280" width="220" height="86" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="84" cy="310" r="8" fill="#2563EB"/>
  <text x="102" y="313" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Request Content
  </text>
  <text x="84" y="337" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    messages, prompt text,
  </text>
  <text x="84" y="357" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    multimodal payload, output shape
  </text>

  <rect x="60" y="384" width="220" height="86" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="84" cy="414" r="8" fill="#0EA5E9"/>
  <text x="102" y="417" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Control Metadata
  </text>
  <text x="84" y="441" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    model=auto, hints, overrides,
  </text>
  <text x="84" y="461" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    caller preferences, debug flags
  </text>

  <rect x="60" y="488" width="220" height="98" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="84" cy="518" r="8" fill="#4338CA"/>
  <text x="102" y="521" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Identity and Governance
  </text>
  <text x="84" y="545" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    tenant, auth scope, privacy class,
  </text>
  <text x="84" y="565" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    region, compliance and policy tags
  </text>

  <rect x="60" y="604" width="220" height="86" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <circle cx="84" cy="634" r="8" fill="#7C3AED"/>
  <text x="102" y="637" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Session Context
  </text>
  <text x="84" y="661" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    previous logical model,
  </text>
  <text x="84" y="681" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    continuity and escalation state
  </text>

  <rect x="340" y="164" width="760" height="124" rx="24" fill="#FFFFFF" stroke="#C7D2FE" filter="url(#shadow)"/>
  <text x="364" y="206" fill="#312E81" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Configured Routing Surfaces
  </text>
  <text x="364" y="234" fill="#6366F1" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    ASE aligns to semantic-router's signal extraction, decision engine, model selection, and plugin chain while keeping endpoint routing downstream.
  </text>

  <rect x="364" y="246" width="220" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="474" y="262" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    MODEL METADATA
  </text>
  <rect x="610" y="246" width="220" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="720" y="262" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    SIGNAL DEFINITIONS
  </text>
  <rect x="856" y="246" width="220" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="966" y="262" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    ROUTING DECISIONS
  </text>

  <rect x="340" y="364" width="760" height="420" rx="24" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/>
  <text x="364" y="406" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Semantic Routing Core
  </text>
  <text x="364" y="434" fill="#3B82F6" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    The module normalizes the request, extracts typed signals, matches a semantic route, selects from `modelRefs`, and then runs per-decision plugins.
  </text>

  <rect x="520" y="460" width="400" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="548" cy="489" r="14" fill="#2563EB"/>
  <text x="548" y="494" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    1
  </text>
  <text x="576" y="484" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Request Normalizer
  </text>
  <text x="576" y="506" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    canonical request, authz, session, and preference state
  </text>

  <rect x="520" y="534" width="400" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="548" cy="563" r="14" fill="#2563EB"/>
  <text x="548" y="568" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    2
  </text>
  <text x="576" y="558" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Signal Extraction Layer
  </text>
  <text x="576" y="580" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    keyword, embedding, domain, modality, jailbreak, pii, and other typed signals
  </text>

  <rect x="520" y="608" width="400" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="548" cy="637" r="14" fill="#2563EB"/>
  <text x="548" y="642" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    3
  </text>
  <text x="576" y="632" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Decision Engine
  </text>
  <text x="576" y="654" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    priority-ordered rules with AND / OR / NOT over typed signals
  </text>

  <rect x="520" y="682" width="400" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="548" cy="711" r="14" fill="#2563EB"/>
  <text x="548" y="716" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    4
  </text>
  <text x="576" y="706" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Model Selection Layer
  </text>
  <text x="576" y="728" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    select from `modelRefs`, reasoning mode, LoRA, and algorithm constraints
  </text>

  <rect x="520" y="756" width="400" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="548" cy="785" r="14" fill="#2563EB"/>
  <text x="548" y="790" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    5
  </text>
  <text x="576" y="780" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Plugin Chain
  </text>
  <text x="576" y="802" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    cache, safety, rewrite, tracing, RAG, and other per-decision hooks
  </text>

  <line x1="720" y1="518" x2="720" y2="534" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="720" y1="592" x2="720" y2="608" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="720" y1="666" x2="720" y2="682" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="720" y1="740" x2="720" y2="756" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="1140" y="364" width="260" height="420" rx="24" fill="#FFFFFF" stroke="#D9F99D" filter="url(#shadow)"/>
  <text x="1164" y="406" fill="#365314" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Outputs and Outcomes
  </text>
  <text x="1164" y="434" fill="#65A30D" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Success and rejection remain explicit, bounded module results.
  </text>

  <rect x="1160" y="478" width="220" height="126" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="1184" y="510" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Enriched Request
  </text>
  <text x="1184" y="536" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    model=&lt;logical-model&gt;
  </text>
  <text x="1184" y="556" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    matched decision, route reason,
  </text>
  <text x="1184" y="576" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    plugin outputs, trace ids, handoff
  </text>
  <text x="1184" y="596" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">
    load balancing consumes this contract
  </text>

  <rect x="1160" y="636" width="220" height="116" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="1184" y="668" fill="#B45309" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Semantic Failure
  </text>
  <text x="1184" y="694" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    no matching decision
  </text>
  <text x="1184" y="714" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    no eligible modelRefs
  </text>
  <text x="1184" y="734" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    policy or authz denial
  </text>

  <rect x="340" y="852" width="1060" height="72" rx="20" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="368" y="888" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    Routing Trace, Reason Codes, and Audit Record
  </text>
  <text x="368" y="914" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Every stage emits structured evidence: signal values, matched decision, candidate modelRefs, algorithm choice, final route reason, and rejection status when applicable.
  </text>

  <line x1="280" y1="323" x2="520" y2="489" stroke="#64748B" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="280" y1="427" x2="520" y2="489" stroke="#64748B" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="280" y1="537" x2="520" y2="489" stroke="#64748B" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="280" y1="647" x2="520" y2="489" stroke="#64748B" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <line x1="474" y1="270" x2="620" y2="682" stroke="#6366F1" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="720" y1="270" x2="720" y2="534" stroke="#6366F1" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="966" y1="270" x2="840" y2="608" stroke="#6366F1" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <line x1="920" y1="785" x2="1160" y2="541" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <line x1="920" y1="637" x2="1160" y2="694" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowAmber)"/>
  <line x1="920" y1="711" x2="1160" y2="714" stroke="#D97706" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowAmber)"/>

  <line x1="520" y1="500" x2="420" y2="500" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="420" y1="500" x2="420" y2="852" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>

  <line x1="520" y1="574" x2="470" y2="574" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="470" y1="574" x2="470" y2="852" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>

  <line x1="520" y1="648" x2="520" y2="852" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="520" y1="722" x2="570" y2="722" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="570" y1="722" x2="570" y2="852" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="920" y1="796" x2="620" y2="796" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="620" y1="796" x2="620" y2="852" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="1270" y1="752" x2="1270" y2="852" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
</svg>
