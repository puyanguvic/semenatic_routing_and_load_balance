<svg width="1600" height="1160" viewBox="0 0 1600 1160" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowSlate" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#15803D"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#D97706"/>
    </marker>
  </defs>

  <rect width="1600" height="1160" rx="28" fill="url(#bg)"/>

  <text x="48" y="60" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Semantic Routing Module Architecture
  </text>
  <text x="48" y="92" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16">
    Upstream reference model: Envoy or AI Gateway at the traffic edge, plus a Go ExtProc service as
  </text>
  <text x="48" y="114" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16">
    the semantic decision engine. This figure isolates the ASE semantic-routing boundary.
  </text>

  <rect x="40" y="134" width="1520" height="984" rx="28" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="64" y="162" fill="#334155" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">
    FULL UPSTREAM BASELINE / ASE SYSTEM CONTEXT
  </text>

  <rect x="56" y="178" width="1488" height="180" rx="24" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <text x="84" y="216" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Policy / Configuration Plane
  </text>
  <text x="84" y="244" fill="#64748B" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    This plane defines what the semantic service may know and decide before any request arrives.
  </text>

  <rect x="84" y="272" width="320" height="60" rx="18" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="108" y="296" fill="#312E81" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    routing
  </text>
  <text x="108" y="316" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    modelCards, signals, decisions
  </text>

  <rect x="438" y="272" width="320" height="60" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="462" y="296" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    providers
  </text>
  <text x="462" y="316" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    defaults, models, backend_refs
  </text>

  <rect x="792" y="272" width="320" height="60" rx="18" fill="#F0FDFA" stroke="#99F6E4"/>
  <text x="816" y="296" fill="#0F766E" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    global
  </text>
  <text x="816" y="316" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    observability, cache, tools, modules
  </text>

  <rect x="1148" y="248" width="356" height="92" rx="20" fill="#F8FBFF" stroke="#DBEAFE"/>
  <text x="1174" y="276" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">
    OWNERSHIP RULE
  </text>
  <text x="1174" y="300" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    routing is module-owned.
  </text>
  <text x="1174" y="320" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    providers and global are upstream system dependencies.
  </text>

  <line x1="800" y1="358" x2="800" y2="388" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowSlate)"/>

  <rect x="56" y="388" width="1488" height="340" rx="24" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/>
  <text x="84" y="426" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Request / Decision Plane
  </text>
  <text x="84" y="454" fill="#64748B" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    This is the only request-time path: ingress to gateway, ExtProc invocation, semantic decision, and
  </text>
  <text x="84" y="474" fill="#64748B" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    decision response back to the gateway.
  </text>

  <rect x="84" y="520" width="210" height="92" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="108" y="554" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Client / OpenAI API
  </text>
  <text x="108" y="580" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    request body, headers,
  </text>
  <text x="108" y="600" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    identity, session
  </text>

  <rect x="334" y="500" width="220" height="132" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="358" y="534" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Envoy / AI Gateway
  </text>
  <text x="358" y="560" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    listeners, filters, timeouts,
  </text>
  <text x="358" y="580" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    route policy, ExtProc callout
  </text>
  <text x="358" y="600" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    and final response forwarding
  </text>

  <rect x="404" y="458" width="176" height="26" rx="13" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="492" y="475" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle">
    EXT_PROC gRPC STREAM
  </text>

  <rect x="590" y="470" width="720" height="170" rx="22" fill="#F8FBFF" stroke="#93C5FD"/>
  <text x="616" y="504" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700">
    Semantic Routing Service
  </text>
  <text x="616" y="528" fill="#3B82F6" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    Upstream-aligned Go ExtProc service with a signal-driven routing pipeline.
  </text>
  <rect x="1146" y="486" width="140" height="26" rx="13" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="1216" y="503" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle">
    DOCUMENT SCOPE
  </text>

  <rect x="620" y="542" width="110" height="82" rx="16" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="646" cy="564" r="14" fill="#2563EB"/>
  <text x="646" y="569" fill="#FFFFFF" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    1
  </text>
  <text x="675" y="580" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Normalize
  </text>
  <text x="675" y="598" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Request
  </text>
  <text x="675" y="616" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11.5">
    request + context
  </text>

  <rect x="760" y="542" width="110" height="82" rx="16" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="786" cy="564" r="14" fill="#2563EB"/>
  <text x="786" y="569" fill="#FFFFFF" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    2
  </text>
  <text x="815" y="580" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Extract
  </text>
  <text x="815" y="598" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Signals
  </text>
  <text x="815" y="616" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11.5">
    typed evidence
  </text>

  <rect x="900" y="542" width="110" height="82" rx="16" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="926" cy="564" r="14" fill="#2563EB"/>
  <text x="926" y="569" fill="#FFFFFF" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    3
  </text>
  <text x="955" y="580" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Evaluate
  </text>
  <text x="955" y="598" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Decisions
  </text>
  <text x="955" y="616" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11.5">
    matched route
  </text>

  <rect x="1040" y="542" width="110" height="82" rx="16" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="1066" cy="564" r="14" fill="#2563EB"/>
  <text x="1066" y="569" fill="#FFFFFF" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    4
  </text>
  <text x="1095" y="580" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Select
  </text>
  <text x="1095" y="598" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Model
  </text>
  <text x="1095" y="616" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11.5">
    logical-model
  </text>

  <rect x="1180" y="542" width="110" height="82" rx="16" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="1206" cy="564" r="14" fill="#2563EB"/>
  <text x="1206" y="569" fill="#FFFFFF" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    5
  </text>
  <text x="1235" y="580" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    Plugins
  </text>
  <text x="1235" y="598" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">
    + Handoff
  </text>
  <text x="1235" y="616" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="11.5">
    contract output
  </text>

  <line x1="294" y1="566" x2="334" y2="566" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowSlate)"/>
  <line x1="554" y1="566" x2="590" y2="566" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <line x1="730" y1="583" x2="760" y2="583" stroke="#2563EB" stroke-width="2.3" marker-end="url(#arrowBlue)"/>
  <line x1="870" y1="583" x2="900" y2="583" stroke="#2563EB" stroke-width="2.3" marker-end="url(#arrowBlue)"/>
  <line x1="1010" y1="583" x2="1040" y2="583" stroke="#2563EB" stroke-width="2.3" marker-end="url(#arrowBlue)"/>
  <line x1="1150" y1="583" x2="1180" y2="583" stroke="#2563EB" stroke-width="2.3" marker-end="url(#arrowBlue)"/>

  <line x1="950" y1="640" x2="950" y2="676" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowSlate)"/>

  <rect x="698" y="676" width="504" height="60" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="950" y="702" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    Decision Response To Gateway
  </text>
  <text x="950" y="722" fill="#64748B" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5" text-anchor="middle">
    request mutation, routing metadata, and dynamic metadata
  </text>

  <rect x="56" y="760" width="1488" height="320" rx="24" fill="#FFFFFF" stroke="#D9F99D" filter="url(#shadow)"/>
  <text x="84" y="798" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Execution / Dispatch Plane
  </text>
  <text x="84" y="826" fill="#64748B" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    Semantic routing finishes before endpoint selection. Split mode is the normative ASE contract; integrated
  </text>
  <text x="84" y="846" fill="#64748B" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="13">
    mode is an upstream-compatible projection for Envoy-based deployments.
  </text>

  <line x1="950" y1="736" x2="950" y2="860" stroke="#475569" stroke-width="2.5" marker-end="url(#arrowSlate)"/>

  <rect x="790" y="860" width="320" height="40" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="950" y="885" fill="#0F172A" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    Semantic Decision Artifact
  </text>

  <rect x="390" y="924" width="340" height="84" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <rect x="606" y="936" width="104" height="22" rx="11" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="658" y="951" fill="#166534" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle">
    ASE SPLIT MODE
  </text>
  <text x="414" y="956" fill="#166534" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Normative Semantic Contract
  </text>
  <text x="414" y="980" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    model=&lt;logical-model&gt;
  </text>
  <text x="414" y="998" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    reason trail, policy tags, trace metadata
  </text>

  <rect x="780" y="924" width="340" height="84" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="804" y="956" fill="#B45309" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Semantic Rejection
  </text>
  <text x="804" y="980" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    validation failure, policy denial,
  </text>
  <text x="804" y="998" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    no matched route, or no eligible model
  </text>

  <rect x="1170" y="924" width="340" height="84" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <rect x="1388" y="936" width="102" height="22" rx="11" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="1439" y="951" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="10.5" font-weight="700" text-anchor="middle">
    OPTIONAL
  </text>
  <text x="1194" y="956" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Upstream Projection
  </text>
  <text x="1194" y="980" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    route header, destination hint,
  </text>
  <text x="1194" y="998" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12.5">
    and selected-model metadata for Envoy
  </text>

  <line x1="950" y1="900" x2="560" y2="924" stroke="#15803D" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="950" y1="900" x2="950" y2="924" stroke="#D97706" stroke-width="2.5" marker-end="url(#arrowAmber)"/>
  <line x1="950" y1="900" x2="1340" y2="924" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>

  <rect x="390" y="1022" width="340" height="42" rx="16" fill="#FFFFFF" stroke="#86EFAC"/>
  <text x="560" y="1041" fill="#166534" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    ASE Load Balancing Module
  </text>
  <text x="560" y="1057" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    endpoint selection, retries, health
  </text>

  <rect x="1170" y="1022" width="340" height="42" rx="16" fill="#FFFFFF" stroke="#93C5FD"/>
  <text x="1340" y="1041" fill="#1D4ED8" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    Envoy Route / Cluster Selection
  </text>
  <text x="1340" y="1057" fill="#475569" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    header match to cluster or endpoint
  </text>

  <line x1="560" y1="1008" x2="560" y2="1022" stroke="#15803D" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="1340" y1="1008" x2="1340" y2="1022" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="56" y="1094" width="1488" height="36" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="84" y="1117" fill="#64748B" font-family="IBM Plex Sans, Segoe UI, Arial, sans-serif" font-size="12">
    Invariant: logical-model selection is the semantic source of truth; endpoint selection is always downstream, whether delegated to ASE load balancing or projected for Envoy consumption.
  </text>
</svg>
