<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <rect width="1600" height="980" rx="28" fill="url(#bg)"/>

  <text x="48" y="60" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    Semantic Routing Module Design Basis
  </text>
  <text x="48" y="92" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Full upstream baseline: Envoy / AI Gateway traffic shell plus Go ExtProc intelligence layer.
  </text>
  <text x="48" y="112" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    This document specifies the semantic decision path inside that envelope.
  </text>

  <rect x="40" y="118" width="1520" height="822" rx="28" fill="none" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="62" y="146" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">
    FULL UPSTREAM ENVELOPE / SYSTEM BASELINE
  </text>

  <rect x="48" y="176" width="320" height="688" rx="24" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/>
  <text x="72" y="214" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Traffic Shell
  </text>
  <text x="72" y="242" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Upstream system envelope owned by
  </text>
  <text x="72" y="262" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    the gateway and deployment layer.
  </text>

  <rect x="72" y="300" width="272" height="110" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="96" y="332" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Client / OpenAI-Compatible
  </text>
  <text x="96" y="352" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    API
  </text>
  <text x="96" y="378" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    request body, headers, identity,
  </text>
  <text x="96" y="398" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    session metadata, and policy context
  </text>

  <rect x="72" y="454" width="272" height="170" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="96" y="488" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    Envoy / AI Gateway
  </text>
  <text x="96" y="514" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    listener, HTTP filter chain,
  </text>
  <text x="96" y="534" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    ExtProc invocation, timeout policy,
  </text>
  <text x="96" y="554" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    header projection, and traffic control
  </text>
  <rect x="84" y="578" width="248" height="28" rx="14" fill="#DBEAFE" stroke="#93C5FD"/>
  <text x="208" y="596" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" text-anchor="middle">
    EXT_PROC CALL INTO ROUTER
  </text>

  <rect x="400" y="176" width="812" height="688" rx="24" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/>
  <text x="424" y="214" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Semantic Routing Module
  </text>
  <text x="424" y="242" fill="#3B82F6" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Preferred basis: upstream Go ExtProc service, canonical config, and routing fragment catalog.
  </text>
  <rect x="962" y="194" width="226" height="28" rx="14" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="1075" y="212" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    DOCUMENT SCOPE
  </text>

  <rect x="424" y="278" width="232" height="120" rx="18" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="446" y="308" fill="#312E81" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Canonical Routing
  </text>
  <text x="446" y="328" fill="#312E81" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Surface
  </text>
  <text x="446" y="350" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    routing.modelCards
  </text>
  <text x="446" y="370" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    routing.signals
  </text>
  <text x="446" y="390" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    routing.decisions
  </text>

  <rect x="690" y="278" width="232" height="120" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="712" y="308" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Provider / Deployment
  </text>
  <text x="712" y="328" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Inputs
  </text>
  <text x="712" y="350" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    providers.defaults
  </text>
  <text x="712" y="370" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    providers.models
  </text>
  <text x="712" y="390" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    backend_refs and pricing
  </text>

  <rect x="956" y="278" width="232" height="120" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="978" y="308" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Runtime / Shared
  </text>
  <text x="978" y="328" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Services
  </text>
  <text x="978" y="350" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    global.router / services / stores
  </text>
  <text x="978" y="370" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    semantic cache, observability,
  </text>
  <text x="978" y="390" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    tools, prompt_guard, classifier
  </text>

  <rect x="528" y="446" width="556" height="84" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="560" cy="488" r="15" fill="#2563EB"/>
  <text x="560" y="493" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    1
  </text>
  <text x="588" y="478" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    Request Normalization
  </text>
  <text x="588" y="500" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    Canonical request object, identity, session state,
  </text>
  <text x="588" y="518" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    policy context, and preference hints
  </text>

  <rect x="528" y="548" width="556" height="84" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="560" cy="590" r="15" fill="#2563EB"/>
  <text x="560" y="595" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    2
  </text>
  <text x="588" y="580" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    Signal Extraction
  </text>
  <text x="588" y="602" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    Typed evidence from keyword, embedding, domain,
  </text>
  <text x="588" y="620" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    PII, jailbreak, preference, and context signals
  </text>

  <rect x="528" y="650" width="556" height="84" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="560" cy="692" r="15" fill="#2563EB"/>
  <text x="560" y="697" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    3
  </text>
  <text x="588" y="682" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    Decision Engine
  </text>
  <text x="588" y="704" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    Priority-ordered rules over typed signals choose
  </text>
  <text x="588" y="722" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    the matched route and its legal candidate set
  </text>

  <rect x="528" y="752" width="556" height="84" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="560" cy="794" r="15" fill="#2563EB"/>
  <text x="560" y="799" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    4
  </text>
  <text x="588" y="776" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Model Selection + 
  </text>
  <text x="588" y="796" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Plugin Chain
  </text>
  <text x="588" y="814" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    Select the logical model from modelRefs.
  </text>
  <text x="588" y="832" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12.5">
    Then apply route plugins, cache hooks, and annotations.
  </text>

  <line x1="806" y1="398" x2="806" y2="446" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="806" y1="530" x2="806" y2="548" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="806" y1="632" x2="806" y2="650" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="806" y1="734" x2="806" y2="752" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <rect x="1244" y="176" width="308" height="688" rx="24" fill="#FFFFFF" stroke="#D9F99D" filter="url(#shadow)"/>
  <text x="1268" y="214" fill="#365314" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Outputs and Integration
  </text>
  <text x="1268" y="242" fill="#65A30D" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    The router may operate in integrated or split mode
  </text>
  <text x="1268" y="260" fill="#65A30D" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    without changing the semantic pipeline.
  </text>

  <rect x="1268" y="300" width="260" height="126" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="1292" y="334" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Normative Semantic Output
  </text>
  <text x="1292" y="360" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    model=&lt;logical-model&gt;
  </text>
  <text x="1292" y="380" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    matched decision, route reason,
  </text>
  <text x="1292" y="400" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    policy tags, trace ids, plugin outputs
  </text>

  <rect x="1268" y="456" width="260" height="120" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="1292" y="486" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700">
    Optional Upstream-Compatible
  </text>
  <text x="1292" y="506" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="14.5" font-weight="700">
    Projection
  </text>
  <text x="1292" y="532" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    route headers or endpoint hints
  </text>
  <text x="1292" y="552" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    for Envoy integration
  </text>
  <text x="1292" y="572" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    in upstream-compatible mode
  </text>

  <rect x="1268" y="606" width="260" height="120" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="1292" y="640" fill="#B45309" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Semantic Failure
  </text>
  <text x="1292" y="666" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    no matching decision, no eligible model,
  </text>
  <text x="1292" y="686" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    policy denial, or validation failure
  </text>

  <rect x="1268" y="748" width="260" height="104" rx="18" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1292" y="782" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Downstream Execution Modes
  </text>
  <text x="1292" y="808" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    ASE split mode: downstream
  </text>
  <text x="1292" y="826" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Load Balancing Module
  </text>
  <text x="1292" y="844" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Integrated mode: direct Envoy path
  </text>

  <rect x="400" y="872" width="1152" height="64" rx="14" fill="#FFFFFF" stroke="#CBD5E1"/>
  <text x="430" y="894" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    Architectural rule: semantic model choice is the source of truth.
  </text>
  <text x="430" y="912" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    If integrated deployments also project endpoint hints, they remain
  </text>
  <text x="430" y="930" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    downstream integration artifacts rather than semantic-policy ownership.
  </text>

  <line x1="344" y1="355" x2="528" y2="488" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="344" y1="539" x2="528" y2="488" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="1084" y1="488" x2="1268" y2="363" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <line x1="1084" y1="794" x2="1268" y2="526" stroke="#2563EB" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="1084" y1="794" x2="1268" y2="666" stroke="#D97706" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1528" y1="798" x2="1560" y2="798" stroke="#16A34A" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
</svg>
