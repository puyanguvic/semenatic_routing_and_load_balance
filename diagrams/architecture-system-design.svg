<svg width="1440" height="860" viewBox="0 0 1440 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <rect width="1440" height="860" rx="28" fill="url(#bg)"/>

  <text x="48" y="62" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">
    ASE System Design
  </text>
  <text x="48" y="94" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Top-level view of ASE: a semantic-router-aligned semantic core hands an explicit logical-model contract to the execution-routing layer.
  </text>

  <rect x="40" y="152" width="170" height="176" rx="24" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="64" y="194" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Client and Ingress
  </text>
  <text x="64" y="224" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    OpenAI-style request enters ASE
  </text>
  <text x="64" y="246" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    through a stable northbound API.
  </text>
  <rect x="60" y="268" width="130" height="40" rx="14" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="125" y="292" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    Client Request
  </text>

  <rect x="288" y="116" width="150" height="28" rx="14" fill="#E0E7FF" stroke="#C7D2FE"/>
  <text x="363" y="135" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    ROUTING CONFIG
  </text>
  <rect x="288" y="152" width="620" height="450" rx="26" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/>
  <text x="316" y="194" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Stage 1: Semantic Routing Core
  </text>
  <text x="316" y="224" fill="#3B82F6" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Aligned to semantic-router's semantic core: `routing.modelCards`, `routing.signals`, `routing.decisions`, `modelRefs`, and per-decision plugins.
  </text>

  <rect x="316" y="246" width="170" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="401" y="262" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    ROUTING.MODELCARDS
  </text>
  <rect x="512" y="246" width="170" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="597" y="262" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    ROUTING.SIGNALS
  </text>
  <rect x="708" y="246" width="170" height="24" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
  <text x="793" y="262" fill="#4338CA" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" text-anchor="middle">
    ROUTING.DECISIONS
  </text>

  <rect x="356" y="318" width="480" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="384" cy="347" r="14" fill="#2563EB"/>
  <text x="384" y="352" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    1
  </text>
  <text x="412" y="342" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Request Normalization
  </text>
  <text x="412" y="364" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    canonical request, session, authz, and preference context
  </text>

  <rect x="356" y="392" width="480" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="384" cy="421" r="14" fill="#2563EB"/>
  <text x="384" y="426" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    2
  </text>
  <text x="412" y="416" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Signal Extraction
  </text>
  <text x="412" y="438" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    keyword, embedding, domain, modality, jailbreak, pii, and other typed signals
  </text>

  <rect x="356" y="466" width="480" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="384" cy="495" r="14" fill="#2563EB"/>
  <text x="384" y="500" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    3
  </text>
  <text x="412" y="490" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Decision Matching and Model Selection
  </text>
  <text x="412" y="512" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    match `routing.decisions`, build `modelRefs`, run the selection algorithm
  </text>

  <rect x="356" y="540" width="480" height="58" rx="18" fill="#EFF6FF" stroke="#93C5FD"/>
  <circle cx="384" cy="569" r="14" fill="#2563EB"/>
  <text x="384" y="574" fill="#FFFFFF" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    4
  </text>
  <text x="412" y="564" fill="#1D4ED8" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Plugins and Enrichment
  </text>
  <text x="412" y="586" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    tracing, safety, cache, rewrite, and route metadata before handoff
  </text>

  <line x1="596" y1="376" x2="596" y2="392" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="596" y1="450" x2="596" y2="466" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <line x1="596" y1="524" x2="596" y2="540" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <rect x="946" y="116" width="170" height="28" rx="14" fill="#DCFCE7" stroke="#86EFAC"/>
  <text x="1031" y="135" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
    EXECUTION ROUTING
  </text>
  <rect x="946" y="152" width="300" height="450" rx="26" fill="#FFFFFF" stroke="#BBF7D0" filter="url(#shadow)"/>
  <text x="974" y="194" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">
    Stage 2: Load Balancing
  </text>
  <text x="974" y="224" fill="#15803D" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    The execution layer honors the semantic handoff and resolves a concrete provider endpoint.
  </text>

  <rect x="974" y="250" width="244" height="40" rx="14" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="1096" y="274" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    Backend Registry and Health State
  </text>

  <rect x="974" y="326" width="244" height="58" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="998" y="350" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Pool Resolution
  </text>
  <text x="998" y="372" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    resolve endpoint pool for the selected logical model
  </text>

  <rect x="974" y="400" width="244" height="58" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="998" y="424" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Endpoint Router
  </text>
  <text x="998" y="446" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    weighted routing, affinity, retries, and bounded failover
  </text>

  <rect x="974" y="474" width="244" height="58" rx="18" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="998" y="498" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">
    Provider Dispatch
  </text>
  <text x="998" y="520" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    execute against the chosen endpoint with provider-specific adaptation
  </text>

  <line x1="1096" y1="290" x2="1096" y2="326" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <line x1="1096" y1="384" x2="1096" y2="400" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <line x1="1096" y1="458" x2="1096" y2="474" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <rect x="1268" y="152" width="132" height="450" rx="26" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="1292" y="194" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Serving
  </text>
  <text x="1292" y="220" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">
    Environment
  </text>
  <rect x="1288" y="266" width="92" height="52" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1334" y="289" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">
    Internal
  </text>
  <text x="1334" y="307" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    pools
  </text>
  <rect x="1288" y="336" width="92" height="52" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1334" y="359" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">
    External
  </text>
  <text x="1334" y="377" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    APIs
  </text>
  <rect x="1288" y="406" width="92" height="52" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1334" y="429" fill="#334155" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" text-anchor="middle">
    Regional
  </text>
  <text x="1334" y="447" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    pools
  </text>

  <rect x="636" y="660" width="288" height="92" rx="22" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="660" y="700" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">
    Observability and Control
  </text>
  <text x="660" y="726" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    Preserve request identity, matched decision,
  </text>
  <text x="660" y="746" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    selected model, endpoint, retries, and outcome.
  </text>

  <rect x="860" y="354" width="66" height="80" rx="16" fill="#FFFFFF" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="893" y="380" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    Handoff
  </text>
  <text x="893" y="404" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    model
  </text>
  <text x="893" y="422" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    matched
  </text>
  <text x="893" y="440" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="12" text-anchor="middle">
    decision
  </text>

  <line x1="210" y1="288" x2="356" y2="347" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="836" y1="495" x2="860" y2="394" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="926" y1="394" x2="974" y2="355" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <line x1="1218" y1="503" x2="1288" y2="362" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <line x1="596" y1="598" x2="596" y2="660" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="1096" y1="532" x2="1096" y2="660" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>
  <line x1="893" y1="434" x2="893" y2="660" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 8"/>

  <rect x="40" y="786" width="1360" height="40" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="68" y="811" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    Stage 1 aligns to semantic-router's signal-driven semantic core. Stage 2 remains a separate execution-routing layer that consumes the handoff but does not reinterpret it.
  </text>
</svg>
