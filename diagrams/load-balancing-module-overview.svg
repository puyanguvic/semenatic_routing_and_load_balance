<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#F0FDF4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="1200" height="400" rx="24" fill="url(#bg)"/>

  <text x="48" y="58" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">
    Load Balancing Module
  </text>
  <text x="48" y="88" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="16">
    Paper-aligned route stage: resolve the chosen logical model to a concrete provider endpoint.
  </text>

  <rect x="40" y="150" width="170" height="154" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="60" y="190" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Logical Model
  </text>
  <text x="60" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    selected m*
  </text>
  <text x="60" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    route metadata
  </text>
  <text x="60" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    session key
  </text>

  <rect x="230" y="150" width="190" height="154" rx="18" fill="#FFFFFF" stroke="#BBF7D0" filter="url(#shadow)"/>
  <text x="250" y="190" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Endpoint Pool
  </text>
  <text x="250" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    endpoints serving m*
  </text>
  <text x="250" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    health and region filter
  </text>
  <text x="250" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    eligible candidates
  </text>

  <rect x="440" y="150" width="220" height="154" rx="18" fill="#FFFFFF" stroke="#86EFAC" filter="url(#shadow)"/>
  <text x="460" y="190" fill="#166534" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Endpoint Router
  </text>
  <text x="460" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    weighted routing
  </text>
  <text x="460" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    sticky session affinity
  </text>
  <text x="460" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    load and failover policy
  </text>

  <rect x="680" y="150" width="190" height="154" rx="18" fill="#FFFFFF" stroke="#34D399" filter="url(#shadow)"/>
  <text x="700" y="190" fill="#065F46" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Provider Adapter
  </text>
  <text x="700" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    auth injection
  </text>
  <text x="700" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    protocol mapping
  </text>
  <text x="700" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    provider metadata
  </text>

  <rect x="890" y="150" width="270" height="154" rx="18" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="910" y="190" fill="#0F172A" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    Dispatch and Recovery
  </text>
  <text x="910" y="218" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    chosen endpoint e*
  </text>
  <text x="910" y="238" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    bounded retry and redispatch
  </text>
  <text x="910" y="258" fill="#475569" font-family="Segoe UI, Arial, sans-serif" font-size="13">
    stream-aware failover limits
  </text>

  <line x1="210" y1="231" x2="230" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="420" y1="231" x2="440" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="660" y1="231" x2="680" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="870" y1="231" x2="890" y2="231" stroke="#475569" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="40" y="336" width="1120" height="44" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="68" y="363" fill="#64748B" font-family="Segoe UI, Arial, sans-serif" font-size="12">
    This module corresponds to the paper's route stage. It resolves e* for the chosen model and executes provider-specific routing behavior.
  </text>
</svg>
