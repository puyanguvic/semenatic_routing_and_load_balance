<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="920" viewBox="0 0 1840 920" version="1.1">
  <defs>
    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #000000; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #000000; }
      .section { font-family: Helvetica, Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #000000; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #000000; }
      .small { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #000000; }
      .tiny { font-family: Helvetica, Arial, sans-serif; font-size: 12px; fill: #000000; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .router { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .lane { fill: #ffffff; stroke: #000000; stroke-width: 1.4; }
      .core { fill: #ffffff; stroke: #000000; stroke-width: 2.2; }
      .chip { fill: #ffffff; stroke: #000000; stroke-width: 1.2; }
      .focus { fill: #ffffff; stroke: #000000; stroke-width: 1.5; stroke-dasharray: 7 5; }
      .request { fill: none; stroke: #000000; stroke-width: 2.2; marker-end: url(#arrow); }
      .response { fill: none; stroke: #000000; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1840" height="920" fill="#ffffff"/>

  <rect x="170" y="40" width="1530" height="820" rx="18" class="box"/>
  <text x="935" y="78" text-anchor="middle" class="title">ASE LLM Gateway</text>

  <text x="240" y="120" class="tiny">Data Plane</text>
  <text x="860" y="120" class="tiny">Router Control Plane + Intelligence Plane</text>
  <text x="1460" y="120" class="tiny">Execution Plane</text>

  <rect x="30" y="420" width="110" height="56" rx="12" class="box"/>
  <text x="85" y="454" text-anchor="middle" class="label">LLM User</text>

  <rect x="210" y="300" width="240" height="160" rx="14" class="box"/>
  <text x="330" y="332" text-anchor="middle" class="subtitle">Gateway Frontend</text>
  <text x="330" y="365" text-anchor="middle" class="small">Listener</text>
  <text x="330" y="388" text-anchor="middle" class="small">REST API</text>
  <text x="330" y="411" text-anchor="middle" class="small">Req Security</text>

  <path d="M 140 448 L 210 380" class="request"/>
  <text x="150" y="404" class="small">LLM Request</text>

  <rect x="510" y="150" width="820" height="560" rx="18" class="router"/>
  <text x="920" y="186" text-anchor="middle" class="subtitle">LLM Semantic Router</text>
  <text x="920" y="208" text-anchor="middle" class="small">vLLM v0.2 style: signal-driven MoM core with projection layer and plugin fabric</text>

  <rect x="550" y="230" width="740" height="40" rx="10" class="lane"/>
  <text x="575" y="255" class="small">Control Plane: rules / policies | model cards | preferences | sessions | overrides</text>

  <rect x="560" y="315" width="150" height="110" rx="12" class="core"/>
  <text x="635" y="345" text-anchor="middle" class="section">Signal</text>
  <text x="635" y="367" text-anchor="middle" class="section">Extraction</text>
  <text x="635" y="394" text-anchor="middle" class="tiny">keyword | embedding</text>
  <text x="635" y="411" text-anchor="middle" class="tiny">kNN | PII | jailbreak</text>

  <rect x="740" y="315" width="150" height="110" rx="12" class="core"/>
  <text x="815" y="345" text-anchor="middle" class="section">Projection</text>
  <text x="815" y="367" text-anchor="middle" class="section">Coordination</text>
  <text x="815" y="394" text-anchor="middle" class="tiny">partitions | scores</text>
  <text x="815" y="411" text-anchor="middle" class="tiny">mappings | continuity</text>

  <rect x="920" y="315" width="200" height="110" rx="12" class="core"/>
  <text x="1020" y="345" text-anchor="middle" class="section">Decision Engine</text>
  <text x="1020" y="377" text-anchor="middle" class="tiny">modelRefs | legal set F(r)</text>
  <text x="1020" y="394" text-anchor="middle" class="tiny">static | AutoMix | Elo | RouterDC</text>
  <text x="1020" y="411" text-anchor="middle" class="tiny">hybrid | latency-aware</text>

  <rect x="1150" y="315" width="140" height="110" rx="12" class="core"/>
  <text x="1220" y="345" text-anchor="middle" class="section">Plugin</text>
  <text x="1220" y="367" text-anchor="middle" class="section">Chain</text>
  <text x="1220" y="394" text-anchor="middle" class="tiny">RouteDecision</text>
  <text x="1220" y="411" text-anchor="middle" class="tiny">target_pool | confidence</text>

  <path d="M 450 380 L 560 370" class="request"/>
  <path d="M 710 370 L 740 370" class="request"/>
  <path d="M 890 370 L 920 370" class="request"/>
  <path d="M 1120 370 L 1150 370" class="request"/>

  <rect x="550" y="480" width="740" height="110" rx="14" class="focus"/>
  <text x="585" y="510" class="section">Plugin Fabric</text>
  <text x="585" y="530" class="small">request / response hooks, enabled per decision</text>

  <rect x="575" y="545" width="105" height="28" rx="8" class="chip"/>
  <text x="627.5" y="563" text-anchor="middle" class="tiny">semantic-cache</text>

  <rect x="700" y="545" width="80" height="28" rx="8" class="chip"/>
  <text x="740" y="563" text-anchor="middle" class="tiny">pii</text>

  <rect x="800" y="545" width="90" height="28" rx="8" class="chip"/>
  <text x="845" y="563" text-anchor="middle" class="tiny">jailbreak</text>

  <rect x="910" y="545" width="110" height="28" rx="8" class="chip"/>
  <text x="965" y="563" text-anchor="middle" class="tiny">system_prompt</text>

  <rect x="1040" y="545" width="120" height="28" rx="8" class="chip"/>
  <text x="1100" y="563" text-anchor="middle" class="tiny">header_mutation</text>

  <rect x="1180" y="545" width="80" height="28" rx="8" class="chip"/>
  <text x="1220" y="563" text-anchor="middle" class="tiny">trace/audit</text>

  <rect x="550" y="620" width="740" height="34" rx="10" class="lane"/>
  <text x="575" y="642" class="small">Feedback Loop: rating | ReMoM | cache update</text>

  <rect x="1400" y="220" width="250" height="180" rx="14" class="focus"/>
  <text x="1525" y="250" text-anchor="middle" class="section">Algorithmic Focus</text>
  <text x="1425" y="288" class="small">signal retrieval: kNN</text>
  <text x="1425" y="318" class="small">ranking: AutoMix | Elo | RouterDC</text>
  <text x="1425" y="348" class="small">selection: hybrid | latency-aware</text>
  <text x="1425" y="378" class="small">calibration: confidence | rating | ReMoM</text>

  <rect x="1400" y="500" width="250" height="110" rx="14" class="box"/>
  <text x="1525" y="532" text-anchor="middle" class="subtitle">ASE LLM Load Balancer</text>
  <text x="1525" y="562" text-anchor="middle" class="small">health | load | locality | queue depth</text>
  <text x="1525" y="584" text-anchor="middle" class="small">runtime endpoint scheduling</text>

  <path d="M 1290 370 L 1400 555" class="request"/>
  <text x="1290" y="350" class="small">RouteDecision / target_pool</text>

  <rect x="1700" y="330" width="110" height="220" rx="14" class="box"/>
  <text x="1755" y="358" text-anchor="middle" class="label">Target Pool</text>

  <rect x="1720" y="390" width="70" height="30" rx="8" class="chip"/>
  <text x="1755" y="409" text-anchor="middle" class="tiny">LLM-1</text>

  <rect x="1720" y="440" width="70" height="30" rx="8" class="chip"/>
  <text x="1755" y="459" text-anchor="middle" class="tiny">LLM-2</text>

  <rect x="1720" y="490" width="70" height="30" rx="8" class="chip"/>
  <text x="1755" y="509" text-anchor="middle" class="tiny">LLM-N</text>

  <path d="M 1650 555 L 1700 440" class="request"/>

  <path d="M 1700 525 L 460 525 L 460 790 L 420 790" class="response"/>
  <path d="M 230 790 L 180 790 L 180 448 L 140 448" class="response"/>
  <text x="114" y="825" class="small">LLM Response</text>

  <rect x="210" y="760" width="240" height="60" rx="12" class="box"/>
  <text x="330" y="795" text-anchor="middle" class="label">Resp Security / Return</text>
</svg>
