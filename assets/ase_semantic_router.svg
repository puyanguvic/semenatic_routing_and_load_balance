<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1040" viewBox="0 0 1920 1040" version="1.1">
  <defs>
    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #000000; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 23px; font-weight: 700; fill: #000000; }
      .section { font-family: Helvetica, Arial, sans-serif; font-size: 19px; font-weight: 700; fill: #000000; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #000000; }
      .small { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #000000; }
      .tiny { font-family: Helvetica, Arial, sans-serif; font-size: 12px; fill: #000000; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .router { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .band { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
      .node { fill: #ffffff; stroke: #000000; stroke-width: 1.4; }
      .research { fill: #ffffff; stroke: #000000; stroke-width: 2; stroke-dasharray: 8 6; }
      .research-box { fill: #ffffff; stroke: #000000; stroke-width: 1.3; stroke-dasharray: 6 4; }
      .request { fill: none; stroke: #000000; stroke-width: 2.2; marker-end: url(#arrow); }
      .response { fill: none; stroke: #000000; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .config { fill: none; stroke: #000000; stroke-width: 1.7; marker-end: url(#arrow); }
      .assist { fill: none; stroke: #000000; stroke-width: 1.2; stroke-dasharray: 6 4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1920" height="1040" fill="#ffffff"/>

  <rect x="170" y="40" width="1700" height="940" rx="18" class="box"/>
  <text x="1020" y="78" text-anchor="middle" class="title">ASE LLM Gateway</text>

  <rect x="30" y="490" width="110" height="56" rx="12" class="box"/>
  <text x="85" y="524" text-anchor="middle" class="label">LLM User</text>

  <rect x="230" y="140" width="190" height="52" rx="12" class="box"/>
  <text x="325" y="172" text-anchor="middle" class="label">LLM Listener</text>

  <rect x="230" y="250" width="190" height="60" rx="12" class="box"/>
  <text x="325" y="285" text-anchor="middle" class="label">RESTful API Service</text>

  <rect x="230" y="360" width="190" height="60" rx="12" class="box"/>
  <text x="325" y="395" text-anchor="middle" class="label">Req Security Check</text>

  <rect x="230" y="850" width="190" height="60" rx="12" class="box"/>
  <text x="325" y="885" text-anchor="middle" class="label">Resp Security Check</text>

  <path d="M 140 518 L 190 518 L 190 166 L 230 166" class="request"/>
  <text x="150" y="468" class="small">LLM Request</text>

  <path d="M 325 192 L 325 250" class="request"/>
  <path d="M 325 310 L 325 360" class="request"/>

  <rect x="460" y="110" width="900" height="720" rx="18" class="router"/>
  <text x="910" y="146" text-anchor="middle" class="subtitle">LLM Semantic Router</text>
  <text x="910" y="168" text-anchor="middle" class="small">Semantic Router selects the target pool; Load Balancer selects the concrete endpoint.</text>

  <rect x="510" y="176" width="150" height="36" rx="10" class="node"/>
  <text x="585" y="198" text-anchor="middle" class="small">Rules and Policies</text>

  <rect x="680" y="176" width="120" height="36" rx="10" class="node"/>
  <text x="740" y="198" text-anchor="middle" class="small">Model Cards</text>

  <rect x="820" y="176" width="130" height="36" rx="10" class="node"/>
  <text x="885" y="198" text-anchor="middle" class="small">Preference Hints</text>

  <rect x="970" y="176" width="140" height="36" rx="10" class="node"/>
  <text x="1040" y="198" text-anchor="middle" class="small">Session Metadata</text>

  <rect x="1130" y="176" width="160" height="36" rx="10" class="node"/>
  <text x="1210" y="198" text-anchor="middle" class="small">Override / Explicit Model</text>

  <rect x="490" y="230" width="840" height="95" rx="14" class="band"/>
  <text x="515" y="256" class="section">1. Signal Extraction</text>
  <text x="515" y="276" class="small">Canonicalize the request and compute explicit routing features before semantic selection begins.</text>
  <text x="515" y="298" class="tiny">signal families: keyword, embedding, modality, tool intent, kNN retrieval, PII, jailbreak</text>

  <rect x="750" y="252" width="130" height="40" rx="10" class="node"/>
  <text x="815" y="276" text-anchor="middle" class="small">Normalize Request</text>

  <rect x="900" y="252" width="145" height="40" rx="10" class="node"/>
  <text x="972.5" y="276" text-anchor="middle" class="small">Build Routing Context</text>

  <rect x="1065" y="252" width="145" height="40" rx="10" class="node"/>
  <text x="1137.5" y="268" text-anchor="middle" class="small">Semantic Signals</text>
  <text x="1137.5" y="282" text-anchor="middle" class="tiny">keyword / embedding / kNN</text>

  <rect x="1230" y="252" width="85" height="40" rx="10" class="node"/>
  <text x="1272.5" y="268" text-anchor="middle" class="small">Safety</text>
  <text x="1272.5" y="282" text-anchor="middle" class="tiny">PII / jailbreak</text>

  <path d="M 420 390 L 450 390 L 450 272 L 750 272" class="request"/>
  <text x="448" y="240" class="small">sanitized request</text>
  <path d="M 880 272 L 900 272" class="request"/>
  <path d="M 1045 272 L 1065 272" class="request"/>
  <path d="M 1210 272 L 1230 272" class="request"/>

  <rect x="490" y="345" width="840" height="105" rx="14" class="band"/>
  <text x="515" y="371" class="section">2. Projection Coordination</text>
  <text x="515" y="391" class="small">Project request semantics into matched rules, candidate modelRefs, and legal target-pool options.</text>
  <text x="515" y="413" class="tiny">rules and policies define the route space; projection coordinates preferences and continuity</text>

  <rect x="750" y="372" width="130" height="42" rx="10" class="node"/>
  <text x="815" y="389" text-anchor="middle" class="tiny">Validate Override /</text>
  <text x="815" y="403" text-anchor="middle" class="tiny">Explicit Model</text>

  <rect x="900" y="372" width="145" height="42" rx="10" class="node"/>
  <text x="972.5" y="389" text-anchor="middle" class="tiny">Match Rules and</text>
  <text x="972.5" y="403" text-anchor="middle" class="tiny">Policies</text>

  <rect x="1065" y="372" width="145" height="42" rx="10" class="node"/>
  <text x="1137.5" y="389" text-anchor="middle" class="tiny">Project modelRefs /</text>
  <text x="1137.5" y="403" text-anchor="middle" class="tiny">candidate pools</text>

  <rect x="1230" y="372" width="85" height="42" rx="10" class="node"/>
  <text x="1272.5" y="389" text-anchor="middle" class="tiny">Preference /</text>
  <text x="1272.5" y="403" text-anchor="middle" class="tiny">continuity</text>

  <path d="M 585 212 L 972.5 372" class="config"/>
  <path d="M 740 212 L 1137.5 372" class="config"/>
  <path d="M 885 212 L 1272.5 372" class="config"/>
  <path d="M 1040 212 L 1272.5 372" class="config"/>
  <path d="M 1210 212 L 815 372" class="config"/>

  <path d="M 880 393 L 900 393" class="request"/>
  <path d="M 1045 393 L 1065 393" class="request"/>
  <path d="M 1210 393 L 1230 393" class="request"/>

  <rect x="490" y="470" width="840" height="155" rx="14" class="band"/>
  <text x="515" y="496" class="section">3. Decision Blocks</text>
  <text x="515" y="516" class="small">Build the legal set first, then optimize only inside the feasible route space.</text>
  <text x="515" y="538" class="tiny">algorithm families: static, AutoMix, Elo, RouterDC, hybrid, latency-aware</text>
  <text x="515" y="556" class="tiny">decision outputs: target_pool, routing_confidence, fallback, route_reason, rating-ready feedback</text>

  <rect x="750" y="515" width="120" height="48" rx="10" class="node"/>
  <text x="810" y="532" text-anchor="middle" class="tiny">Hard Filter</text>
  <text x="810" y="546" text-anchor="middle" class="tiny">capability / policy /</text>
  <text x="810" y="560" text-anchor="middle" class="tiny">PII / jailbreak</text>

  <rect x="890" y="515" width="120" height="48" rx="10" class="node"/>
  <text x="950" y="532" text-anchor="middle" class="tiny">Legal Candidate Set</text>
  <text x="950" y="546" text-anchor="middle" class="tiny">F(r)</text>

  <rect x="1030" y="515" width="150" height="48" rx="10" class="node"/>
  <text x="1105" y="532" text-anchor="middle" class="tiny">Route Scoring</text>
  <text x="1105" y="546" text-anchor="middle" class="tiny">U(r, p)</text>
  <text x="1105" y="560" text-anchor="middle" class="tiny">rank / tie-break</text>

  <rect x="1200" y="515" width="115" height="48" rx="10" class="node"/>
  <text x="1257.5" y="532" text-anchor="middle" class="tiny">Select</text>
  <text x="1257.5" y="546" text-anchor="middle" class="tiny">target_pool</text>
  <text x="1257.5" y="560" text-anchor="middle" class="tiny">confidence</text>

  <path d="M 870 539 L 890 539" class="request"/>
  <path d="M 1010 539 L 1030 539" class="request"/>
  <path d="M 1180 539 L 1200 539" class="request"/>

  <rect x="490" y="645" width="840" height="105" rx="14" class="band"/>
  <text x="515" y="671" class="section">4. Plugin Chain</text>
  <text x="515" y="691" class="small">Attach execution-time mutations, explanation, traceability, and the formal handoff object.</text>
  <text x="515" y="713" class="tiny">plugin surfaces: header/body mutation, system prompt, RAG, audit, trace, semantic cache update</text>

  <rect x="750" y="670" width="120" height="42" rx="10" class="node"/>
  <text x="810" y="687" text-anchor="middle" class="tiny">Header / Body</text>
  <text x="810" y="701" text-anchor="middle" class="tiny">Mutation</text>

  <rect x="890" y="670" width="150" height="42" rx="10" class="node"/>
  <text x="965" y="687" text-anchor="middle" class="tiny">System Prompt /</text>
  <text x="965" y="701" text-anchor="middle" class="tiny">RAG Hooks</text>

  <rect x="1060" y="670" width="145" height="42" rx="10" class="node"/>
  <text x="1132.5" y="687" text-anchor="middle" class="tiny">Audit / Trace /</text>
  <text x="1132.5" y="701" text-anchor="middle" class="tiny">Route Reason</text>

  <rect x="1225" y="670" width="90" height="42" rx="10" class="node"/>
  <text x="1270" y="687" text-anchor="middle" class="tiny">Emit</text>
  <text x="1270" y="701" text-anchor="middle" class="tiny">RouteDecision</text>

  <path d="M 870 691 L 890 691" class="request"/>
  <path d="M 1040 691 L 1060 691" class="request"/>
  <path d="M 1205 691 L 1225 691" class="request"/>

  <rect x="520" y="770" width="150" height="46" rx="12" class="box"/>
  <text x="595" y="790" text-anchor="middle" class="small">Semantic Cache</text>
  <text x="595" y="806" text-anchor="middle" class="tiny">lookup before route</text>

  <rect x="700" y="770" width="170" height="46" rx="12" class="box"/>
  <text x="785" y="790" text-anchor="middle" class="small">PII / Jailbreak</text>
  <text x="785" y="806" text-anchor="middle" class="tiny">detectors and policy tags</text>

  <rect x="900" y="770" width="210" height="46" rx="12" class="box"/>
  <text x="1005" y="790" text-anchor="middle" class="small">Feedback / rating / ReMoM</text>
  <text x="1005" y="806" text-anchor="middle" class="tiny">confidence calibration and online adaptation</text>

  <rect x="1140" y="770" width="170" height="46" rx="12" class="box"/>
  <text x="1225" y="790" text-anchor="middle" class="small">Mutation Plugins</text>
  <text x="1225" y="806" text-anchor="middle" class="tiny">header / body / prompt adapters</text>

  <path d="M 595 770 L 595 292" class="assist"/>
  <path d="M 595 770 L 595 712" class="assist"/>
  <path d="M 785 770 L 785 563" class="assist"/>
  <path d="M 785 770 L 1272.5 292" class="assist"/>
  <path d="M 1005 770 L 1105 563" class="assist"/>
  <path d="M 1225 770 L 1225 712" class="assist"/>

  <rect x="1390" y="120" width="270" height="650" rx="16" class="research"/>
  <text x="1525" y="150" text-anchor="middle" class="section">Research / Algorithmic Work</text>
  <text x="1525" y="171" text-anchor="middle" class="small">What we can improve as algorithms, not only as static config.</text>

  <rect x="1415" y="220" width="220" height="86" rx="12" class="research-box"/>
  <text x="1430" y="243" class="small">Signal learning and retrieval</text>
  <text x="1430" y="260" class="tiny">embedding similarity, kNN retrieval,</text>
  <text x="1430" y="274" class="tiny">uncertainty-aware extraction,</text>
  <text x="1430" y="288" class="tiny">confidence features from request context</text>

  <rect x="1415" y="340" width="220" height="86" rx="12" class="research-box"/>
  <text x="1430" y="363" class="small">Candidate projection</text>
  <text x="1430" y="380" class="tiny">rules and policies, modelRef graph,</text>
  <text x="1430" y="394" class="tiny">route-space construction,</text>
  <text x="1430" y="408" class="tiny">pool feasibility shaping</text>

  <rect x="1415" y="460" width="220" height="104" rx="12" class="research-box"/>
  <text x="1430" y="483" class="small">Constrained route optimization</text>
  <text x="1430" y="500" class="tiny">static, AutoMix, Elo, RouterDC,</text>
  <text x="1430" y="514" class="tiny">hybrid and latency-aware ranking,</text>
  <text x="1430" y="528" class="tiny">fallback policy, confidence estimation,</text>
  <text x="1430" y="542" class="tiny">rating-aware tie-break</text>

  <rect x="1415" y="600" width="220" height="86" rx="12" class="research-box"/>
  <text x="1430" y="623" class="small">Online adaptation</text>
  <text x="1430" y="640" class="tiny">rating signals, ReMoM, cache feedback,</text>
  <text x="1430" y="654" class="tiny">closed-loop tuning, confidence calibration</text>

  <rect x="1415" y="710" width="220" height="40" rx="12" class="research-box"/>
  <text x="1430" y="734" class="small">Boundary: health / load / queue depth belong to LB</text>

  <path d="M 1330 272 L 1415 263" class="assist"/>
  <path d="M 1330 393 L 1415 383" class="assist"/>
  <path d="M 1330 539 L 1415 512" class="assist"/>
  <path d="M 1005 816 L 1415 643" class="assist"/>

  <rect x="1405" y="820" width="255" height="110" rx="12" class="box"/>
  <text x="1532.5" y="850" text-anchor="middle" class="label">ASE LLM Load Balancer</text>
  <text x="1532.5" y="872" text-anchor="middle" class="small">health / load / locality / queue depth</text>
  <text x="1532.5" y="889" text-anchor="middle" class="small">connection pool and runtime endpoint scheduling</text>
  <text x="1532.5" y="906" text-anchor="middle" class="small">inside the selected target_pool</text>

  <path d="M 1315 691 L 1380 691 L 1380 875 L 1405 875" class="request"/>
  <text x="1336" y="676" class="small">semantic handoff: RouteDecision + target_pool</text>

  <rect x="1690" y="370" width="180" height="240" rx="16" class="box"/>
  <text x="1780" y="400" text-anchor="middle" class="label">Target Pool / LLM Cluster</text>

  <rect x="1732" y="435" width="96" height="36" rx="10" class="node"/>
  <text x="1780" y="458" text-anchor="middle" class="small">LLM Server</text>

  <rect x="1732" y="490" width="96" height="36" rx="10" class="node"/>
  <text x="1780" y="513" text-anchor="middle" class="small">LLM Server</text>

  <rect x="1732" y="545" width="96" height="36" rx="10" class="node"/>
  <text x="1780" y="568" text-anchor="middle" class="small">LLM Server</text>

  <path d="M 1660 875 L 1680 875 L 1680 490 L 1690 490" class="request"/>
  <text x="1668" y="840" class="small">runtime endpoint selection</text>

  <path d="M 1690 520 L 1645 520 L 1645 793 L 1110 793" class="response"/>
  <text x="1475" y="548" class="small">response / feedback</text>

  <path d="M 900 875 L 450 875 L 450 880 L 420 880" class="response"/>
  <path d="M 230 880 L 180 880 L 180 518 L 140 518" class="response"/>
  <text x="108" y="915" class="small">LLM Response</text>
</svg>
