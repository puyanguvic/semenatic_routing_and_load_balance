<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1840" height="920" viewBox="0 0 1840 920" version="1.1">
  <defs>
    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #000000; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #000000; }
      .section { font-family: Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #000000; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #000000; }
      .small { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #000000; }
      .tiny { font-family: Helvetica, Arial, sans-serif; font-size: 12px; fill: #000000; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .router { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .band { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
      .core { fill: #ffffff; stroke: #000000; stroke-width: 2.5; }
      .focus { fill: #ffffff; stroke: #000000; stroke-width: 1.6; stroke-dasharray: 7 5; }
      .request { fill: none; stroke: #000000; stroke-width: 2.2; marker-end: url(#arrow); }
      .response { fill: none; stroke: #000000; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1840" height="920" fill="#ffffff"/>

  <rect x="180" y="40" width="1600" height="840" rx="18" class="box"/>
  <text x="980" y="78" text-anchor="middle" class="title">ASE LLM Gateway</text>

  <rect x="40" y="430" width="110" height="56" rx="12" class="box"/>
  <text x="95" y="464" text-anchor="middle" class="label">LLM User</text>

  <rect x="230" y="140" width="190" height="52" rx="12" class="box"/>
  <text x="325" y="172" text-anchor="middle" class="label">LLM Listener</text>

  <rect x="230" y="245" width="190" height="60" rx="12" class="box"/>
  <text x="325" y="280" text-anchor="middle" class="label">RESTful API Service</text>

  <rect x="230" y="350" width="190" height="60" rx="12" class="box"/>
  <text x="325" y="385" text-anchor="middle" class="label">Req Security Check</text>

  <rect x="230" y="760" width="190" height="60" rx="12" class="box"/>
  <text x="325" y="795" text-anchor="middle" class="label">Resp Security Check</text>

  <path d="M 150 458 L 190 458 L 190 166 L 230 166" class="request"/>
  <text x="158" y="408" class="small">LLM Request</text>

  <path d="M 325 192 L 325 245" class="request"/>
  <path d="M 325 305 L 325 350" class="request"/>

  <rect x="470" y="110" width="900" height="610" rx="18" class="router"/>
  <text x="920" y="146" text-anchor="middle" class="subtitle">LLM Semantic Router</text>
  <text x="920" y="168" text-anchor="middle" class="small">Select target_pool, not endpoint.</text>

  <rect x="510" y="190" width="820" height="42" rx="10" class="band"/>
  <text x="530" y="216" class="small">Control Plane: rules | policies | model cards | preferences | sessions | overrides</text>

  <rect x="510" y="255" width="820" height="78" rx="12" class="band"/>
  <text x="535" y="282" class="section">1. Signal Extraction</text>
  <text x="535" y="307" class="small">normalize | routing context | keyword | embedding | kNN | PII | jailbreak | semantic cache</text>

  <rect x="510" y="355" width="820" height="78" rx="12" class="band"/>
  <text x="535" y="382" class="section">2. Projection Coordination</text>
  <text x="535" y="407" class="small">matched rules | modelRefs / pools | capability / policy gating | continuity</text>

  <rect x="510" y="455" width="820" height="95" rx="12" class="core"/>
  <text x="535" y="482" class="section">3. Decision Blocks</text>
  <text x="535" y="507" class="small">legal set F(r) | rank U(r,p) | static | AutoMix | Elo | RouterDC | hybrid | latency-aware</text>
  <text x="535" y="528" class="small">confidence | fallback | route_reason</text>

  <rect x="510" y="572" width="820" height="78" rx="12" class="band"/>
  <text x="535" y="599" class="section">4. Plugin Chain</text>
  <text x="535" y="624" class="small">header/body mutation | prompt/RAG | audit/trace | RouteDecision</text>

  <rect x="510" y="670" width="820" height="34" rx="10" class="band"/>
  <text x="535" y="692" class="small">Feedback: rating | ReMoM | cache update</text>

  <path d="M 420 380 L 470 380 L 470 294 L 510 294" class="request"/>
  <path d="M 920 333 L 920 355" class="request"/>
  <path d="M 920 433 L 920 455" class="request"/>
  <path d="M 920 550 L 920 572" class="request"/>

  <rect x="1410" y="150" width="300" height="320" rx="16" class="focus"/>
  <text x="1560" y="180" text-anchor="middle" class="section">Algorithmic Focus</text>
  <text x="1435" y="220" class="small">signal retrieval: kNN</text>
  <text x="1435" y="255" class="small">route ranking: AutoMix | Elo | RouterDC</text>
  <text x="1435" y="290" class="small">policy-aware selection: hybrid | latency-aware</text>
  <text x="1435" y="325" class="small">calibration: confidence | rating | ReMoM</text>
  <text x="1435" y="360" class="small">boundary: health / load / queue depth stay in LB</text>

  <rect x="1410" y="510" width="300" height="110" rx="14" class="box"/>
  <text x="1560" y="542" text-anchor="middle" class="label">ASE LLM Load Balancer</text>
  <text x="1560" y="566" text-anchor="middle" class="small">health | load | locality | queue depth</text>
  <text x="1560" y="587" text-anchor="middle" class="small">runtime endpoint scheduling</text>

  <rect x="1730" y="380" width="90" height="42" rx="10" class="box"/>
  <text x="1775" y="406" text-anchor="middle" class="small">LLM Server</text>

  <rect x="1730" y="440" width="90" height="42" rx="10" class="box"/>
  <text x="1775" y="466" text-anchor="middle" class="small">LLM Server</text>

  <rect x="1730" y="500" width="90" height="42" rx="10" class="box"/>
  <text x="1775" y="526" text-anchor="middle" class="small">LLM Server</text>

  <rect x="1710" y="340" width="130" height="240" rx="16" class="box"/>
  <text x="1775" y="366" text-anchor="middle" class="label">Target Pool</text>

  <path d="M 1330 611 L 1410 565" class="request"/>
  <text x="1326" y="590" class="small">RouteDecision / target_pool</text>

  <path d="M 1710 540 L 1730 460" class="request"/>

  <path d="M 1710 540 L 430 540 L 430 790 L 420 790" class="response"/>
  <path d="M 230 790 L 180 790 L 180 458 L 150 458" class="response"/>
  <text x="116" y="835" class="small">LLM Response</text>
</svg>
