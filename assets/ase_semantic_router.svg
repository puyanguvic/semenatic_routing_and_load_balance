<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" version="1.1">
  <defs>
    <style>
      .title { font-family: Helvetica, Arial, sans-serif; font-size: 28px; font-weight: 700; fill: #000000; }
      .subtitle { font-family: Helvetica, Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #000000; }
      .section-title { font-family: Helvetica, Arial, sans-serif; font-size: 20px; font-weight: 700; fill: #000000; }
      .label { font-family: Helvetica, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #000000; }
      .small { font-family: Helvetica, Arial, sans-serif; font-size: 13px; fill: #000000; }
      .box { fill: #ffffff; stroke: #000000; stroke-width: 2; }
      .node { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
      .band { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
      .band-blue { fill: #ffffff; }
      .band-teal { fill: #ffffff; }
      .band-amber { fill: #ffffff; }
      .band-green { fill: #ffffff; }
      .config { fill: #ffffff; stroke: #000000; stroke-width: 1.5; }
      .request { fill: none; stroke: #000000; stroke-width: 2.5; marker-end: url(#arrow-blue); }
      .response { fill: none; stroke: #000000; stroke-width: 2.5; stroke-dasharray: 8 6; marker-end: url(#arrow-purple); }
      .config-line { fill: none; stroke: #000000; stroke-width: 2; marker-end: url(#arrow-gray); }
      .divider { fill: none; stroke: #000000; stroke-width: 1.2; stroke-dasharray: 5 5; }
    </style>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#000000"/>
    </marker>
